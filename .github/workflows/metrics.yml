name: Metrics

on:
  schedule:
    # GitHub Actions usa UTC.
    # 06:00 UTC = 03:00 no horário de Brasília.
    - cron: "0 6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViniciusKanh
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_lines: yes

      - name: Commit and push metrics.svg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add metrics.svg

          if git diff --cached --quiet; then
            echo "Nenhuma alteração em metrics.svg. Commit ignorado."
          else
            git commit -m "📊 Atualiza metrics.svg"
            git push
          fi
